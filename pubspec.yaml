name: food_recognizer
description: A powerful food recognition app powered by Gemini AI to identify dishes, recipes, and detailed nutritional values.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  google_generative_ai: ^0.4.0
  image_picker: ^1.1.2
  shared_preferences: ^2.2.3
  url_launcher: ^6.2.5
  flutter_tts: ^4.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
